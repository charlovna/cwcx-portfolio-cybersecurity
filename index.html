<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Charles Wyatt — Cybersecurity Analyst</title>
  <meta name="description" content="Cybersecurity analyst and AI-fluent practitioner." />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2339FF14' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'/%3E%3C/svg%3E" />
</head>
<body data-page="home">
  <div id="nav-mount"></div>

  <section id="home" class="hero">
    <div class="hero-inner">
      <div class="boot">
        <span class="line"><span class="typewriter" style="--tw-end:100%">INITIALIZING SYSTEM<span class="ok">...</span></span></span>
        <span class="line"><span class="typewriter tw-2">LOADING PROFILE: charles_wyatt</span></span>
        <span class="line"><span class="typewriter tw-3">STATUS: <span class="ok">ONLINE</span></span></span>
      </div>

      <h1 class="hero-name">
        <span class="ln first fade-on-load" style="--load-delay:3.1s">CHARLES</span>
        <span class="ln last glow-green fade-on-load glitch" data-text="WYATT" style="--load-delay:3.35s">WYATT</span>
      </h1>

      <div class="hero-subtitle fade-on-load" style="--load-delay:3.7s">
        // Cybersecurity Analyst<span class="sep">|</span>AI-Fluent Practitioner
      </div>

      <div class="cmd-stack">
        <a href="contact.html" class="cmd-btn fade-on-load" style="--load-delay:4.0s">
          <span class="pr">$ </span><span class="cmd">./contact</span><span class="arg"> --open</span>
        </a>
        <a href="write-ups.html" class="cmd-btn fade-on-load" style="--load-delay:4.2s">
          <span class="pr">$ </span><span class="cmd">./writeups</span><span class="arg"> --browse</span>
        </a>
      </div>

      <div class="stat-bar fade-on-load" style="--load-delay:4.5s">
        <div class="stat"><div class="n">11</div><div class="lbl">Certifications</div></div>
        <div class="stat"><div class="n">00</div><div class="lbl">Write-ups</div></div>
        <div class="stat"><div class="n">08</div><div class="lbl">Core Skills</div></div>
      </div>
    </div>
  </section>

  <div id="footer-mount"></div>
  <script src="_partials.js"></script>
  <script src="site.js"></script>
</body>
</html>
