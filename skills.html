<!DOCTYPE html>

<body data-page="skills">
  <div id="nav-mount"></div>

  <section id="skills" style="padding-top:7rem;">

        <div class="skill reveal delay-1">
          <div class="skill-head"><span class="skill-name">Incident Detection &amp; Response</span><span class="skill-pct">75%</span></div>
          <div class="skill-track"><div class="skill-fill" data-level="75"></div></div>

        <div class="skill reveal delay-1">
          <div class="skill-head"><span class="skill-name">Linux &amp; SQL</span><span class="skill-pct">72%</span></div>
          <div class="skill-track"><div class="skill-fill" data-level="72"></div></div>
        </div>
        <div class="skill reveal delay-2">
          <div class="skill-head"><span class="skill-name">Python Automation</span><span class="skill-pct">68%</span></div>
          <div class="skill-track"><div class="skill-fill" data-level="68"></div></div>

        <div class="skill reveal delay-2">

        <div class="skill reveal delay-3">

          <div class="skill-track"><div class="skill-fill" data-level="80"></div></div>

        <div class="skill reveal delay-3">
          <div class="skill-head"><span class="skill-name">Security Frameworks</span><span class="skill-pct">70%</span></div>
          <div class="skill-track"><div class="skill-fill" data-level="70"></div></div>

        <div class="skill reveal delay-4">
          <div class="skill-head"><span class="skill-name">SIEM / Log Analysis</span><span class="skill-pct">65%</span></div>
          <div class="skill-track"><div class="skill-fill" data-level="65"></div></div>

      <div class="tools-row reveal">
        <span class="tool">Wireshark</span>

        <span class="tool">Docker</span>
        <span class="tool">Claude API</span>
