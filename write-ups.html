<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Write-ups — Charles Wyatt</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2339FF14' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'/%3E%3C/svg%3E" />
</head>
<body data-page="writeups">
  <div id="nav-mount"></div>

  <section style="padding-top:7rem;">
    <div class="wrap">
      <header class="section-head reveal">
        <div class="section-eyebrow">02 //</div>
        <h2 class="section-title">WRITE<span class="glow-green" style="color:var(--green)">_UPS</span></h2>
        <div class="gradient-line"></div>
        <p style="margin-top:1.25rem; font-family:var(--font-body); color:var(--muted); max-width:60ch; line-height:1.6;">
          Hands-on investigations from SOC simulations, malware analysis, and threat-hunting labs.
        </p>
      </header>

      <!-- Category filter -->
      <div class="filter-row reveal" data-filter-group="#writeup-table">
        <span class="lead">cat:</span>
        <button class="filter-btn active" data-filter="ALL">[ALL]</button>
        <button class="filter-btn" data-filter="FORENSICS">[FORENSICS]</button>
        <button class="filter-btn" data-filter="MALWARE">[MALWARE/IR]</button>
        <button class="filter-btn" data-filter="THREAT">[THREAT INTEL]</button>
        <button class="filter-btn" data-filter="LOG">[LOG ANALYSIS]</button>
        <button class="filter-btn" data-filter="SOC">[SOC SIM]</button>
      </div>

      <!-- Difficulty filter -->
      <div class="filter-row reveal">
        <span class="lead">diff:</span>
        <button class="filter-btn active" data-filter="ALL">[ALL]</button>
        <button class="filter-btn" data-filter="VERY-EASY">[VERY EASY]</button>
        <button class="filter-btn" data-filter="EASY">[EASY]</button>
        <button class="filter-btn" data-filter="MEDIUM">[MEDIUM]</button>
        <button class="filter-btn" data-filter="HARD">[HARD]</button>
      </div>

      <!-- Empty state -->
      <div id="writeup-table" class="reveal" style="
        border:1px dashed var(--border);
        padding:5rem 2rem;
        text-align:center;
        font-family:var(--font-mono);
        margin-top:1rem;
      ">
        <div style="font-size:0.78rem; letter-spacing:0.22em; color:var(--green); margin-bottom:1rem;">
          // NO_ENTRIES_YET
        </div>
        <div style="font-family:var(--font-body); color:var(--muted); font-size:1.05rem; line-height:1.6; max-width:38ch; margin:0 auto;">
          Write-ups incoming. Lab reports from TryHackMe, HTB, and personal investigations will land here as they're finished.
        </div>
        <div style="margin-top:1.75rem; font-size:0.72rem; letter-spacing:0.18em; color:var(--muted-dim);">
          $ <span style="color:var(--green);">ls</span> ./writeups
          <br/>
          <span style="color:var(--muted-dim);">total 0</span>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-mount"></div>
  <script src="_partials.js"></script>
  <script src="site.js"></script>
</body>
</html>
